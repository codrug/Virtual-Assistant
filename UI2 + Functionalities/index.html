<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Assistant</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/ml5@latest/dist/ml5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.8.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/toxicity"></script>
  <script src="https://cdn.jsdelivr.net/npm/openai@3.5.0"></script>
  <script src="https://unpkg.com/compromise"></script>
  <script src="script.js" defer></script>
  <!--<img class="logo" src="logo.png" alt="Logo img">-->
</head>
<body>
  <div class="container">
    <!-- Current date and time -->
    <div class="datetime" id="datetime"></div>
    <img href> <img>
    <!-- Title  -->
    <h1>I'm <span id="name">Nova</span>,Your <span id="va">Virtual Assistant</span></h1>

    <!-- Background upload button -->
    <input type="file" id="backgroundUpload" accept="image/*" onchange="setBackground()" hidden>
    <button class="upload-button" onclick="document.getElementById('backgroundUpload').click()">Change Background</button>

    <!-- Voice Feedback Animation -->
    <div class="voice-feedback" id="voiceFeedback" style="display: none;">
      <div class="voice-bar" style="animation-delay: 0s;"></div>
      <div class="voice-bar" style="animation-delay: 0.2s;"></div>
      <div class="voice-bar" style="animation-delay: 0.4s;"></div>
      <div class="voice-bar" style="animation-delay: 0.6s;"></div>
      <div class="voice-bar" style="animation-delay: 0.8s;"></div>
    </div>

    <!-- Microphone Button -->
    <button class="mic-button" onclick="startListening()" aria-label="Start Listening">
      <img src="mic-icon.png" alt="Microphone Icon">
    </button>

    <!-- Transcript Display Box -->
    <div id="content" class="transcript-display"></div>
    <script src="script.js"></script>
  </div>
  

</body>
</html>
